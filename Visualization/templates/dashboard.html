{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<h2 class="page-title">Live Dashboard</h2>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Parameter</th>
                <th>Register</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Auto updated -->
        </tbody>
    </table>
</div>

<div class="action-buttons">
    <button class="btn secondary">
        <a href="/select-parameters">Back to Select</a>
    </button>

     <button class="btn primary">
        <a href="/graph">Go to graph</a>
    </button>
    <button class="btn danger">
        <a href="/logout">Logout</a>
    </button>
</div>

{% endblock %}

{% block extra_css %}
<style>
    .btn.primary {
    background: #4c5cff;
}
.page-title {
    color: khaki;
    margin: 10px 30px;
}

.table-container {
    margin: 0 30px;
    height: calc(100vh - 200px);
    overflow-y: auto;
    padding-right: 8px;
}

.table-container::-webkit-scrollbar {
    width: 6px;
}

.table-container::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #161a20;
    border-radius: 12px;
    overflow: hidden;
}

thead {
    background: #0f1115;
    position: sticky;
    top: 0;
    z-index: 2;
}

th, td {
    padding: 14px 18px;
    border-bottom: 1px solid #2a2e35;
    text-align: left;
}

th {
    color: #9da7ff;
    font-size: 14px;
}

tr:hover {
    background-color: #1f2430;
}

.action-buttons {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 15px;
}

.btn {
    padding: 10px 22px;
    border-radius: 20px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.btn a {
    color: white;
    text-decoration: none;
}

.btn.danger {
    background: #e6004c;
}

.btn.secondary {
    background: #4c5cff;
}
</style>
{% endblock %}

{% block extra_js %}
<script>
function loadDashboardData() {
    fetch("/api/dashboard-data")
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";

            data.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${row.name}</td>
                    <td>${row.register}</td>
                    <td>${row.value}</td>
                `;
                tbody.appendChild(tr);
            });
        });
}

// Initial load
loadDashboardData();

// Auto refresh every 2 seconds
setInterval(loadDashboardData, 2000);
</script>
{% endblock %}
